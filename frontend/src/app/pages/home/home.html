<div class="container mt-5">

  <div class="row">

    <div
      class="col-lg-3 col-md-6 mb-4"
      *ngFor="let job of jobs">

      <div class="job-card">

        <h5>{{ job.title }}</h5>

        <h6>{{ job.company }}</h6>

        <p>📍 {{ job.location }}</p>

        <p>💼 {{ job.jobType }}</p>

        <p>Rs {{ job.salary | number }}</p>

        <button class="apply-btn">
          View Job
        </button>

      </div>

    </div>

  </div>

</div>

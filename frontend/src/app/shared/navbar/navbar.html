<nav class="navbar navbar-expand-lg navbar-light custom-navbar">
  <div class="container">

    <!-- Logo -->
    <a
      class="navbar-brand fw-bold"
      [routerLink]="isJobSeekerLoggedIn ? '/jobseeker/dashboard' : '/'">

      <span class="brand-job">Job</span>
      <span class="brand-sphere">Sphere</span>

    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav ms-auto align-items-center">

        <!-- Home -->
        <li
          class="nav-item"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }">

          <a
            class="nav-link"
            [routerLink]="isJobSeekerLoggedIn ? '/jobseeker/dashboard' : '/'">

            Home

          </a>

        </li>

        <!-- Logged In Job Seeker Menu -->
        <ng-container *ngIf="isJobSeekerLoggedIn; else guestMenu">

          <li
            class="nav-item"
            routerLinkActive="active-link">

            <a
              class="nav-link"
              routerLink="/jobseeker/applications">

              Applications

            </a>

          </li>

          <li
            class="nav-item"
            routerLinkActive="active-link">

            <a
              class="nav-link"
              routerLink="/jobseeker/saved-jobs">

              Saved Jobs

            </a>

          </li>

          <li
            class="nav-item"
            routerLinkActive="active-link">

            <a
              class="nav-link"
              routerLink="/jobseeker/profile">

              Profile

            </a>

          </li>

          <li class="nav-item ms-3">

            <button
              class="btn recruiter-btn"
              (click)="logout()">

              Logout

            </button>

          </li>

        </ng-container>

        <!-- Guest Menu -->
        <ng-template #guestMenu>

          <li class="nav-item ms-3">

            <a
              class="btn recruiter-btn"
              routerLink="/login/employer">

              Recruiters Login

            </a>

          </li>

          <li class="nav-item ms-3">

            <a
              class="btn seeker-btn"
              routerLink="/jobseeker/auth">

              Job Seekers Login

            </a>

          </li>

        </ng-template>

      </ul>

    </div>

  </div>
</nav>

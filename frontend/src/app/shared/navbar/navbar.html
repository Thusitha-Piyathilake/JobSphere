<nav class="navbar navbar-expand-lg navbar-light custom-navbar">
  <div class="container">

    <!-- Logo -->
    <a
      class="navbar-brand fw-bold"
      [routerLink]="
        isJobSeekerLoggedIn
          ? '/jobseeker/dashboard'
          : isEmployerLoggedIn
            ? '/employer/dashboard'
            : isAdminLoggedIn
              ? '/admin/dashboard'
              : '/'
      ">

      <span class="brand-job">Job</span>
      <span class="brand-sphere">Sphere</span>

    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav ms-auto align-items-center">

        <!-- ================= ADMIN NAVBAR ================= -->
        <ng-container *ngIf="isAdminLoggedIn">

          <li class="nav-item d-flex align-items-center">

            <div
              class="rounded-circle d-flex align-items-center justify-content-center me-3"
              style="
                width:50px;
                height:50px;
                background:#F97316;
                color:#fff;
                font-weight:bold;
                font-size:22px;">

              A

            </div>

            <div class="me-4">

              <div class="fw-bold text-dark">
                Administrator
              </div>

              <small class="text-muted">
                System Admin
              </small>

            </div>

          </li>

        </ng-container>

        <!-- ================= JOB SEEKER NAVBAR ================= -->
        <ng-container *ngIf="isJobSeekerLoggedIn">

          <!-- Home -->
          <li
            class="nav-item"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }">

            <a
              class="nav-link"
              routerLink="/jobseeker/dashboard">

              Home

            </a>

          </li>

          <li class="nav-item" routerLinkActive="active-link">
            <a class="nav-link" routerLink="/jobseeker/applications">
              Applications
            </a>
          </li>

          <li class="nav-item" routerLinkActive="active-link">
            <a class="nav-link" routerLink="/jobseeker/saved-jobs">
              Saved Jobs
            </a>
          </li>

          <li class="nav-item" routerLinkActive="active-link">
            <a class="nav-link" routerLink="/jobseeker/profile">
              Profile
            </a>
          </li>

          <li class="nav-item ms-3">
            <button
              class="btn recruiter-btn"
              (click)="logout()">
              Logout
            </button>
          </li>

        </ng-container>

        <!-- ================= EMPLOYER NAVBAR ================= -->
        <ng-container *ngIf="isEmployerLoggedIn">

          <!-- Home -->
          <li
            class="nav-item"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }">

            <a
              class="nav-link"
              routerLink="/employer/dashboard">

              Home

            </a>

          </li>

          <li class="nav-item" routerLinkActive="active-link">
            <a class="nav-link" routerLink="/employer/create-job">
              Create Job
            </a>
          </li>

          <li class="nav-item" routerLinkActive="active-link">
            <a class="nav-link" routerLink="/employer/my-jobs">
              My Jobs
            </a>
          </li>

          <li class="nav-item" routerLinkActive="active-link">
            <a class="nav-link" routerLink="/employer/applicants">
              Applicants
            </a>
          </li>

          <li class="nav-item" routerLinkActive="active-link">
            <a class="nav-link" routerLink="/employer/profile">
              Profile
            </a>
          </li>

          <li class="nav-item ms-3">
            <button
              class="btn recruiter-btn"
              (click)="logout()">
              Logout
            </button>
          </li>

        </ng-container>

        <!-- ================= GUEST NAVBAR ================= -->
        <ng-container
          *ngIf="!isJobSeekerLoggedIn && !isEmployerLoggedIn && !isAdminLoggedIn">

          <li class="nav-item">

            <a
              class="nav-link"
              routerLink="/">

              Home

            </a>

          </li>

          <li class="nav-item ms-3">

            <a
              class="btn recruiter-btn"
              routerLink="/employer/auth">

              Recruiters Login

            </a>

          </li>

          <li class="nav-item ms-3">

            <a
              class="btn seeker-btn"
              routerLink="/jobseeker/auth">

              Job Seekers Login

            </a>

          </li>

        </ng-container>

      </ul>

    </div>

  </div>
</nav>
